name: FleetFlow CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-frontend:
    name: Frontend Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
      - name: Run Vitest Suite
        run: cd frontend && npm test -- --run

  test-backend:
    name: Backend REST Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install Backend Dependencies
        run: cd backend && npm ci
      - name: Run Backend Integration Tests
        run: cd backend && npm test

  test-ai-service:
    name: Python AI Microservice Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify FastAPI Import & App Structure
        run: |
          cd ai-service
          python -c "import main; print('FastAPI App Loaded Successfully')"

  docker-build:
    name: Verify Docker Container Builds
    needs: [test-frontend, test-backend, test-ai-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate Docker Compose Configuration
        run: docker compose config
