version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fleetflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fleetflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/fleetflow
      - JWT_SECRET=super-secret-production-jwt-key
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - fleetflow-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: fleetflow-ai-service
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_PORT=8000
      - BACKEND_URL=http://backend:5000
    networks:
      - fleetflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
    networks:
      - fleetflow-network

volumes:
  mongo-data:

networks:
  fleetflow-network:
    driver: bridge
